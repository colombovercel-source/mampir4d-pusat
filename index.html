<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Official Claim System — MAMPIR4D Professional</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
:root {
  --primary: #d97706; 
  --primary-light: #fbbf24;
  --bg-dark: #0a0a0a;
  --surface: rgba(255, 255, 255, 0.05);
  --border: rgba(217, 119, 6, 0.4);
  --font-head: 'Syne', sans-serif;
}

body {
  margin: 0; font-family: 'Plus Jakarta Sans', sans-serif;
  /* --- PENAMBAHAN BACKGROUND GAMBAR DI SINI --- */
  background: linear-gradient(rgba(10,10,10,0.85), rgba(10,10,10,0.85)), url('https://i.imgur.com/wPlgJU7.png');
  background-size: cover; 
  background-position: center; 
  background-attachment: fixed;
  /* -------------------------------------------- */
  display: flex; flex-direction: column; align-items: center; color: #eaddcf; padding-top: 100px;
  overflow-x: hidden;
}

/* TOP BAR */
.top-bar {
  background: rgba(0,0,0,0.9); width: 100%; height: 85px; display: flex; align-items: center; justify-content: center;
  position: fixed; top: 0; z-index: 1000; border-bottom: 1px solid var(--border); backdrop-filter: blur(15px);
}
.top-bar-content { width: 100%; max-width: 1200px; display: flex; align-items: center; justify-content: center; position: relative; }
.top-bar-logo { height: 48px; width: auto; filter: drop-shadow(0 0 12px var(--primary)); }

/* BURGER & CLOSE MENU */
.menu-burger { position: absolute; left: 20px; cursor: pointer; width: 30px; }
.menu-burger span { display: block; height: 3px; width: 100%; background: var(--primary); margin: 5px 0; border-radius: 2px; }

.side-menu {
  position: fixed; top: 0; left: 0; width: 280px; height: 100%; background: #0d0d0d; border-right: 2px solid var(--border);
  z-index: 2000; padding: 40px 20px; box-shadow: 10px 0 50px rgba(0,0,0,0.9); transform: translateX(-110%); transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}
.side-menu.active { transform: translateX(0); }
.close-nav { text-align: right; font-size: 30px; color: #ff4d4d; cursor: pointer; margin-bottom: 20px; }
.side-menu a { display: block; color: white; text-decoration: none; padding: 16px; font-weight: 700; border-radius: 10px; margin-bottom: 5px; transition: 0.3s; font-size: 14px; text-transform: uppercase; }
.side-menu a:hover { background: var(--surface); color: var(--primary); padding-left: 25px; }

/* SLIDER */
.slider-container { width: 92%; max-width: 420px; border-radius: 25px; overflow: hidden; border: 1px solid var(--border); box-shadow: 0 15px 35px rgba(0,0,0,0.8); }
.slider-wrapper { display: flex; transition: transform 0.6s ease-in-out; }
.slider-wrapper img { width: 100%; flex-shrink: 0; }

/* URGENCE TIMER */
.urgent-timer { background: #ff4d4d; color: white; padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: 800; margin: 15px 0; animation: pulse 1.5s infinite; }
@keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

/* FORM CONTAINER */
.card {
  width: 92%; max-width: 420px; background: var(--surface); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 30px; padding: 35px 25px; margin-bottom: 20px; text-align: center; backdrop-filter: blur(10px);
}

.quota-box { margin-bottom: 25px; }
.quota-text { font-size: 11px; font-weight: 800; color: var(--primary); display: flex; justify-content: space-between; margin-bottom: 8px; text-transform: uppercase; }
.quota-bar-bg { width: 100%; height: 8px; background: rgba(0,0,0,0.5); border-radius: 10px; overflow: hidden; }
.quota-bar-fill { height: 100%; width: 88%; background: linear-gradient(90deg, var(--primary), #ffd700); transition: 5s ease-in-out; }

input {
  width: 100%; padding: 18px; margin-bottom: 15px; border-radius: 15px; border: 1px solid #333;
  background: rgba(0,0,0,0.6); color: white; outline: none; transition: 0.3s; font-family: inherit;
}
input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(217, 119, 6, 0.2); }

.main-btn {
  width: 100%; background: linear-gradient(135deg, var(--primary), #b45309); color: #fff; border: none;
  padding: 20px; border-radius: 15px; font-size: 16px; font-weight: 800; cursor: pointer; text-transform: uppercase;
  box-shadow: 0 8px 20px rgba(217, 119, 6, 0.3); transition: 0.3s;
}
.main-btn:active { transform: scale(0.97); }

/* ADVANCED NOTIFICATIONS */
.live-notif {
  position: fixed; bottom: 30px; left: 20px; background: #161616; padding: 15px;
  border-radius: 18px; border: 1px solid var(--border); font-size: 12px; z-index: 9999;
  display: flex; align-items: center; gap: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
  animation: slideIn 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28);
}
@keyframes slideIn { from { transform: translateY(50px) scale(0.8); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }

/* FLOATING CONTACT */
.fab-contact {
  position: fixed; right: 20px; bottom: 20px; width: 60px; height: 60px; background: #25d366;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 10px 20px rgba(0,0,0,0.5); z-index: 1000; animation: bounce 2s infinite;
}
@keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

.footer-banner { width: 92%; max-width: 420px; margin-top: 10px; margin-bottom: 50px; border-radius: 20px; overflow: hidden; }
</style>
</head>
<body>

<div id="notif-container"></div>

<div class="top-bar">
    <div class="top-bar-content">
        <div class="menu-burger" onclick="toggleMenu()"><span></span><span></span><span></span></div>
        <img src="https://i.imgur.com/CH8VkaL.png" class="top-bar-logo">
    </div>
</div>

<div class="side-menu" id="sideMenu">
    <div class="close-nav" onclick="toggleMenu()">×</div>
    <a href="https://mampirdalam.com/">Lobby Utama</a>
    <a href="https://mampirdalam.com/">Daftar Akun</a>
    <a href="https://mampirdalam.com/">Riwayat Klaim</a>
    <a href="https://mampirdalam.com/">Bantuan Live</a>
</div>

<div class="slider-container">
    <div class="slider-wrapper" id="slider">
        <img src="https://i.imgur.com/tslIcXL.png"><img src="https://i.imgur.com/7QdWmhi.png"><img src="https://i.imgur.com/28gSXXs.png">
    </div>
</div>

<div class="urgent-timer">BERAKHIR DALAM: <span id="timer">14:59</span></div>

<div class="card">
    <div class="quota-box">
        <div class="quota-text"><span>🔥 Slot Terbatas:</span><span id="qCount">11/12 Tersedia</span></div>
        <div class="quota-bar-bg"><div class="quota-bar-fill" id="qBar"></div></div>
    </div>

    <h1 style="font-family:var(--font-head); font-size:26px; margin:0;">Event Reward</h1>
    <p style="font-size:12px; color:#888; margin-bottom:25px;">Verifikasi ID anda untuk menerima saldo freebet.</p>

    <input type="text" id="userId" placeholder="ID Akun MAMPIR4D">
    <input type="text" id="voucher" placeholder="Voucher: MAMPIR4DCUAN">
    
    <button class="main-btn" id="claimBtn" onclick="processClaim()">KLAIM SEKARANG</button>
    <div id="statusMsg" style="margin-top:15px; font-size:13px; font-weight:700;"></div>
</div>

<div class="card" style="padding: 20px;">
    <div style="font-family:var(--font-head); font-size:12px; color:var(--primary); text-align:left; margin-bottom:15px; letter-spacing:1px;">TRANSAKSI TERBARU</div>
    <table style="width:100%; border-collapse:collapse; font-size:13px;" id="hTable"></table>
</div>

<div class="footer-banner"><img src="https://i.imgur.com/8rBhMEk.png" width="100%"></div>

<a href="https://mampirdalam.com/" class="fab-contact">
    <img src="https://img.icons8.com/color/34/whatsapp--v1.png" alt="CS">
</a>

<script>
function toggleMenu() { document.getElementById("sideMenu").classList.toggle("active"); }

// Slider Smooth
let sIdx = 0;
setInterval(() => {
    sIdx = (sIdx + 1) % 3;
    const slider = document.getElementById("slider");
    if(slider) slider.style.transform = `translateX(-${sIdx * 100}%)`;
}, 4000);

// Timer Urgency
let timeLeft = 899;
setInterval(() => {
    let m = Math.floor(timeLeft / 60);
    let s = timeLeft % 60;
    const timerElem = document.getElementById("timer");
    if(timerElem) timerElem.innerText = `${m}:${s < 10 ? '0'+s : s}`;
    if(timeLeft > 0) timeLeft--;
}, 1000);

// Scarcity Anim
setTimeout(() => { 
    const qBar = document.getElementById("qBar");
    const qCount = document.getElementById("qCount");
    if(qBar) qBar.style.width = "8%"; 
    if(qCount) qCount.innerText = "1/12 Tersedia";
}, 8000);

// Advanced Live Notification & Table Update
function showNotif() {
    const container = document.getElementById('notif-container');
    if(!container) return;
    const uPrefix = ["MMP","WIN","BOSS","LUCKY","VIP"];
    const user = uPrefix[Math.floor(Math.random()*uPrefix.length)] + Math.floor(Math.random()*89+10) + "***";
    const amount = (Math.floor(Math.random()*81+20)*1000);
    
    // Create Notif Pop Up
    const n = document.createElement('div');
    n.className = 'live-notif';
    n.innerHTML = `
        <div style="background:var(--primary);padding:8px;border-radius:12px;font-size:18px;">💰</div>
        <div>
            <div style="font-weight:800; color:white;">${user} Baru Saja Klaim!</div>
            <div style="color:var(--primary-light); font-size:11px;">Menerima IDR ${amount.toLocaleString('id-ID')}</div>
        </div>
    `;
    container.appendChild(n);
    
    // Update Table History
    const tbl = document.getElementById("hTable");
    if(tbl) {
        const row = tbl.insertRow(0);
        row.innerHTML = `<td style="padding:12px 0; border-bottom:1px solid #222;">${user}</td><td style="text-align:right; color:var(--primary); font-weight:bold;">IDR ${amount.toLocaleString('id-ID')}</td>`;
        if(tbl.rows.length > 6) tbl.deleteRow(6);
    }

    setTimeout(() => { 
        n.style.opacity="0"; 
        n.style.transform="translateY(-20px)";
        setTimeout(()=>n.remove(),500); 
    }, 4500);
}
setInterval(showNotif, 7000);
for(let i=0; i<5; i++) showNotif(); // Isi awal tabel

// Claim Logic
function processClaim() {
    const id = document.getElementById("userId").value;
    const v = document.getElementById("voucher").value;
    const btn = document.getElementById("claimBtn");
    
    if(!id || v !== "MAMPIR4DCUAN") {
        document.getElementById("statusMsg").innerHTML = "<span style='color:#ff4d4d'>ID Akun atau Kode Voucher Salah!</span>";
        return;
    }

    btn.innerText = "MENGHUBUNGKAN KE SERVER...";
    btn.disabled = true;

    setTimeout(() => {
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#d97706', '#ffffff'] });
        document.getElementById("statusMsg").innerHTML = "<span style='color:#4ade80'>BERHASIL! SALDO SEDANG DI PROSES KE ID ANDA.</span>";
        btn.innerText = "PENGIRIMAN BERHASIL";
        setTimeout(() => { window.location.href = "https://mampirdalam.com/"; }, 2500);
    }, 2500);
}
</script>
</body>
</html>
